<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FURRYLAND Command Center</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    :root { 
        --fl-orange: #f07b23; 
        --fl-blue: #2576d0; 
        --fl-bg: #0f172a; 
        --fl-accent: #f2ffff; 
    }
    
    html { scroll-behavior: smooth; }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--fl-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        margin: 0;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
    }

    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: 
          radial-gradient(circle at 15% 15%, rgba(37, 118, 208, 0.12) 0%, transparent 50%),
          radial-gradient(circle at 85% 85%, rgba(240, 123, 35, 0.08) 0%, transparent 50%);
        pointer-events: none;
        z-index: -1;
    }

    .result-display {
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        font-weight: 800;
        margin-top: 15px;
        font-size: 20px;
        text-transform: uppercase;
        border: 3px solid transparent;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        animation: popIn 0.3s ease-out;
        width: 100%;
        box-sizing: border-box;
    }

    .is-complex { background-color: #ffebee; color: #c62828; border-color: #c62828; }
    .is-simple { background-color: #e8f5e9; color: #2e7d32; border-color: #2e7d32; }

    @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    .tabs { display: flex; gap: 8px; margin-bottom: 15px; width: 95%; max-width: 550px; z-index: 1010; }
    .tab-btn { 
        flex: 1; padding: 12px; border: none; border-radius: 12px; 
        background: rgba(255,255,255,0.15); 
        cursor: pointer; font-weight: bold; color: #fff; transition: 0.2s; font-size: 14px; 
    }
    .tab-btn.active { background: var(--fl-blue); color: white; box-shadow: 0 4px 15px rgba(37, 118, 208, 0.4); }

    .card {
        background: rgba(255, 255, 255, 0.75) !important;
        backdrop-filter: blur(20px) saturate(160%);
        -webkit-backdrop-filter: blur(20px) saturate(160%);
        border: 1px solid rgba(255, 255, 255, 0.4);
        padding: 25px;
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        width: 95%;
        max-width: 550px;
        text-align: center;
        border-top: 6px solid var(--fl-orange);
        margin-bottom: 12px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        z-index: 1000;
        transition: transform 0.3s ease;
    }   
    
    h2 { color: var(--fl-orange); margin: 0; font-weight: 800; text-transform: uppercase; font-size: 26px; }
    .subtitle { color: #222; font-size: 14px; margin: 2px 0 18px 0; font-weight: 600; text-transform: uppercase; }
    input { padding: 14px; font-size: 16px; width: 100%; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; background-color: var(--fl-accent); outline: none; margin-bottom: 10px; text-align: center; }
    .search-container { position: relative; width: 100%; }
    
    #customDropdown, #customBreedDropdown { 
        position: absolute; top: 100%; left: 0; right: 0; 
        background: white; border-radius: 12px; max-height: 220px; 
        overflow-y: auto; z-index: 9999; display: none; 
        box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin-top: 5px; border: 1px solid #eee; 
    }
    
    .dropdown-item, .breed-item { padding: 14px; cursor: pointer; font-size: 15px; text-align: center; border-bottom: 1px solid #f5f5f5; color: #333; }
    .dropdown-item:hover, .breed-item:hover { background: var(--fl-accent); color: var(--fl-blue); }
    
    #searchBtn { padding: 14px; width: 100%; background-color: var(--fl-orange); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; }
    
    #result { margin-top: 12px; font-size: 15px; font-weight: 800; color: #ffffff; min-height: 20px; }
    #breedResult { width: 100%; display: flex; justify-content: center; align-items: center; min-height: 100px; margin-top: 10px; }

    #location-list { width: 95%; max-width: 1200px; background: rgba(255, 255, 255, 0.95); border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); overflow: hidden; margin-top: 10px; }

    .directory-table { width: 100%; border-collapse: collapse; text-align: left; }
    .directory-table th { background: #f8f9fa; color: #666; padding: 15px; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #eee; }
    .directory-table td { padding: 15px; border-bottom: 1px solid #f2f2f2; font-size: 14px; vertical-align: middle; }

    .city-name { font-weight: 700; color: var(--fl-orange); font-size: 15px; }
    .action-link { text-decoration: none; font-weight: 700; color: #28a745; background: #e8f5e9; padding: 8px 16px; border-radius: 8px; font-size: 12px; display: inline-block; }
    .copy-btn { border:none; background:#eee; cursor:pointer; border-radius:4px; padding:2px 5px; margin-left:5px; font-size:12px; }

    #map-wrapper { position: relative; width: 95%; max-width: 1200px; margin-top: 40px; margin-bottom: 50px; z-index: 1; }
    #map { height: 500px; width: 100%; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
    #resetMapBtn { position: absolute; top: 15px; right: 15px; z-index: 1000; background: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    
    .pulsing-marker { width: 10px; height: 10px; background-color: var(--fl-blue); border-radius: 50%; border: 2px solid white; position: relative; }
    .pulsing-marker::after { content: ""; width: 100%; height: 100%; border: 3px solid var(--fl-blue); border-radius: 50%; position: absolute; top: -3px; left: -3px; animation: pulse 2.5s infinite ease-out; }
    @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(3); opacity: 0; } }
    .hidden { display: none !important; }
</style>
</head>
<body>

<div class="tabs">
  <button id="tab-loc" class="tab-btn active" onclick="switchTab('locator')">ZIP Locator</button>
  <button id="tab-breed" class="tab-btn" onclick="switchTab('breed')">Breed Guide</button>
</div>

<div id="locator-section" style="width:100%; display:flex; flex-direction:column; align-items:center;">
    <div class="card">
      <h2>FURRYLAND</h2>
      <p class="subtitle">Search Hubs</p>
      <input type="text" id="zipInput" placeholder="Enter ZIP Code" maxlength="5" inputmode="numeric">
      <div class="search-container">
        <input type="text" id="hubSearchInput" placeholder="Type or Browse City..." onfocus="showDropdown()" oninput="filterDropdown()">
        <div id="customDropdown"></div>
      </div>
      <button id="searchBtn" onclick="lookup()" disabled>Syncing Data...</button>
      <div id="result"></div>
    </div>

    <p id="list-header" class="hidden">STATE DIRECTORY</p>
    <div id="location-list"></div>

    <div id="map-wrapper">
      <button id="resetMapBtn" onclick="resetMap()">Reset USA View</button>
      <div id="map"></div>
    </div>
</div>

    </div>

       <p style="color:#999; font-style: italic;">Results will appear here...</p>
    </div>
  </div>
</div>

  // --- BREED LOGIC ---
  async function loadBreeds() {
    const breedCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=552993732&single=true&output=csv';
    try {
        const response = await fetch(breedCsvUrl);
        const csvText = await response.text();
        const rows = csvText.split(/\r?\n/); 
        breedDatabase = []; 
        rows.slice(1).forEach(row => {
            const cols = row.split(',');
            if (cols[0]) {
                let nameA = cols[0].replace(/"/g, "").trim();
                if (nameA) breedDatabase.push({ name: nameA, type: "Complex" });
            }
            if (cols[1]) {
                let nameB = cols[1].replace(/"/g, "").trim();
                if (nameB) breedDatabase.push({ name: nameB, type: "Non-Complex" });
            }
        });
        buildBreedDropdown();
    } catch (err) { console.error("❌ Breed Load Failed:", err); }
  }

  function buildBreedDropdown() {
    const dropdown = document.getElementById('customBreedDropdown');
    const sortedBreeds = breedDatabase.sort((a, b) => a.name.localeCompare(b.name));
    dropdown.innerHTML = sortedBreeds.map(b => `<div class="breed-item" onclick="selectBreed('${b.name}')">${b.name}</div>`).join('');
  }

  function showBreedDropdown() { document.getElementById('customBreedDropdown').style.display = 'block'; }
  function filterBreeds() {
    const input = document.getElementById('breedInput').value.toLowerCase();
    document.querySelectorAll('.breed-item').forEach(item => {
        item.style.display = item.innerText.toLowerCase().includes(input) ? 'block' : 'none';
    });
  }
  function selectBreed(name) {
    document.getElementById('breedInput').value = name;
    document.getElementById('customBreedDropdown').style.display = 'none';
    checkBreed(name);
  }
  function checkBreed(val) {
    const display = document.getElementById('breedResult');
    const found = breedDatabase.find(b => b.name.toLowerCase() === val.toLowerCase());
    if (found) {
        const isComplex = found.type === "Complex";
        display.innerHTML = `<div class="result-display ${isComplex ? 'is-complex' : 'is-simple'}">${found.name} is a ${found.type} coat</div>`;
    } else {
        display.innerHTML = `<p style="color:#999; font-style: italic;">Results will appear here...</p>`;
    }
  }

  // --- UPDATED LOCAL EXCEL LOAD DATA (SHEETJS) ---
  async function loadData() {
      try {
          const searchBtn = document.getElementById('searchBtn');
          searchBtn.textContent = "Syncing Local DB...";
          searchBtn.disabled = true;

          // Fetch the local Excel file 
          const response = await fetch('database.xlsx');
          if (!response.ok) {
              throw new Error(`Failed to fetch database.xlsx: ${response.statusText}`);
          }
          
          const arrayBuffer = await response.arrayBuffer();
          const workbook = XLSX.read(arrayBuffer, { type: 'array' });

          // Loop through every single tab (Sheet) in the workbook
          workbook.SheetNames.forEach(sheetName => {
              const worksheet = workbook.Sheets[sheetName];
              const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });

              rows.forEach((row, rowIndex) => {
                  // Skip header rows if present
                  if (rowIndex === 0 && isNaN(Number(row[1]))) return; 

                  if (row.length < 8) return; // Safeguard against completely empty rows

                  let phoneNumber = row[2] ? String(row[2]).trim() : "";

                  // --- THE GATEKEEPER START ---
                  // If phone is blank or says OFFLINE, skip this location entirely
                  if (phoneNumber === "" || phoneNumber.toUpperCase() === "OFFLINE") {
                      return; 
                  }
                  // --- THE GATEKEEPER END ---

                  // Push exact formatting to global data array
                  data.push({ 
                      name: String(row[0] || "").trim(), 
                      zip: String(row[1] || "").trim(), 
                      phone: phoneNumber, 
                      link: String(row[3] || "#").trim(), 
                      city: String(row[4] || "").trim(),
                      state: String(row[5] || "").trim(), 
                      lat: row[6] ? String(row[6]).trim() : null, 
                      lng: row[7] ? String(row[7]).trim() : null,
                      closureNote: String(row[8] || "").trim()
                  });
              });
          });

          // Re-enable app
          searchBtn.disabled = false;
          searchBtn.textContent = "Search ZIP";
          plotHubs(); 
          buildCustomDropdown();

      } catch (err) { 
          console.error("Sync Error:", err); 
          document.getElementById('searchBtn').textContent = "Database Sync Failed";
      }
  }

  async function lookup() {
    const zip = document.getElementById('zipInput').value.trim();
    const res = document.getElementById('result');
    const list = document.getElementById('location-list');
    const head = document.getElementById('list-header');
    list.innerHTML = ""; res.innerHTML = "";
    const match = data.find(d => d.zip === zip);
    if (match) {
        res.innerText = "📍 Match Found: " + match.city;
        head.classList.remove('hidden'); head.innerText = "SEARCH RESULT";
        renderSingleRow(match, false);
        let hubCoords = rawCoords[match.city]; 
        let flyLat = hubCoords ? hubCoords[0] : (match.lat ? parseFloat(match.lat) : null);
        let flyLng = hubCoords ? hubCoords[1] : (match.lng ? parseFloat(match.lng) : null);
        if (flyLat && flyLng) map.flyTo([flyLat, flyLng], 14);
        return;
    }
    if (zip.length === 5) {
        res.innerText = "🔍 Checking nearby...";
        try {
            const response = await fetch(`https://api.zippopotam.us/us/${zip}`);
            const zipData = await response.json();
            const tLat = parseFloat(zipData.places[0].latitude);
            const tLon = parseFloat(zipData.places[0].longitude);
            let closestDist = Infinity; let closestRow = null;
            data.forEach(row => {
                let hubCoords = rawCoords[row.city];
                let rLat = hubCoords ? hubCoords[0] : (row.lat ? parseFloat(row.lat) : null);
                let rLng = hubCoords ? hubCoords[1] : (row.lng ? parseFloat(row.lng) : null);
                if (rLat && rLng) {
                    const dist = getDistance(tLat, tLon, rLat, rLng);
                    if (dist < closestDist) { closestDist = dist; closestRow = row; }
                }
            });
            if (closestRow && closestDist <= 8) {
                res.innerHTML = `<span style="color: #ff8080;">🛑 Neighbor Found: ${closestDist.toFixed(1)} miles away</span>`;
                head.classList.remove('hidden'); head.innerText = "NEIGHBOR ALERT";
                list.innerHTML = `<div style="background:#fff5f5; padding:25px; border-radius:15px; text-align:center; color:#c53030; margin-bottom:20px; border:2px solid #feb2b2; line-height:1.8;">
                    <strong>🛑 NEIGHBOR ZIP: APPROVAL REQUIRED</strong><br>ZIP ${zip} is ${closestDist.toFixed(1)} miles from FurryLand ${closestRow.city}.
                </div>`;
                renderSingleRow(closestRow, true);
                let hubCoords = rawCoords[closestRow.city];
                let fLat = hubCoords ? hubCoords[0] : parseFloat(closestRow.lat);
                let fLng = hubCoords ? hubCoords[1] : parseFloat(closestRow.lng);
                map.flyTo([fLat, fLng], 12);
            } else { res.innerText = "❌ No service within range."; resetSearchState(); }
        } catch (e) { res.innerText = "❌ Invalid ZIP."; resetSearchState(); }
    }
  }

  function resetMap() { 
    map.setView([39.82, -98.57], 4); 
    document.getElementById('location-list').innerHTML = ""; 
    document.getElementById('list-header').classList.add('hidden'); 
    document.getElementById('result').innerText = "";
    document.getElementById('zipInput').value = "";
    document.getElementById('hubSearchInput').value = "";
    if(clockInterval) clearInterval(clockInterval);
  }

  function plotHubs() {
    for(let k in markers) map.removeLayer(markers[k]);
    data.forEach(d => {
      const city = d.city.trim();
      if (city && rawCoords[city] && !markers[city]) {
        const icon = L.divIcon({ className: '', html: '<div class="pulsing-marker"></div>', iconSize: [10, 10], iconAnchor: [5, 5] });
        markers[city] = L.marker(rawCoords[city], { icon: icon }).addTo(map).bindPopup(`<strong>FurryLand ${city}</strong><br>📞 ${d.phone}`);
      }
    });
  }

  function getDistance(lat1, lon1, lat2, lon2) {
    const R = 3958.8; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)); 
  }

  function renderSingleRow(m, isNeighbor = false) {
    const list = document.getElementById('location-list');
    const badge = isNeighbor ? `<span style="background:#718096; color:white; padding:3px 10px; border-radius:6px; font-size:11px; margin-left:12px; font-weight:800;">INQUIRY ONLY</span>` : "";
    
    if(clockInterval) clearInterval(clockInterval);
    clockInterval = setInterval(() => updateLiveClock(m.state), 1000);
    
    let alertBox = "";
    if (m.closureNote && m.closureNote.length > 2) {
      const noteUpper = m.closureNote.toUpperCase();
      if (noteUpper.includes("BEFORE") || noteUpper.includes("AFTER")) {
        alertBox = `<div style="background:#fff5f5; padding:20px; border-radius:15px; text-align:center; color:#c53030; border:2px solid #feb2b2; margin-bottom:15px; font-weight:bold;">🛑 MAJOR ROAD CLOSURE (BLACKOUT ZONE)<br><span style="font-weight:normal; font-size:13px;">${m.closureNote}</span></div>`;
      } else {
        alertBox = `<div style="background:#ebf8ff; padding:15px; border-radius:12px; text-align:center; color:#2b6cb0; border:2px solid #bee3f8; margin-bottom:15px; font-weight:bold; font-size:13px;">📢 TRAFFIC ADVISORY<br><span style="font-weight:normal; font-size:13px;">${m.closureNote}</span></div>`;
      }
    }

    list.innerHTML = `
      ${alertBox}
      <div style="background: rgba(37, 118, 208, 0.1); padding: 12px; border-radius: 12px; margin-bottom: 12px; text-align: center; border: 2px solid var(--fl-blue);">
        <span style="color: var(--fl-blue); font-weight: 900; font-size: 16px; letter-spacing: 1px;">🕒 HUB LOCAL TIME: <span id="live-hub-clock">--:--:-- --</span></span>
      </div>
      <table class="directory-table">
        <thead><tr><th>Hub Location</th><th>Phone Number</th><th>Action</th></tr></thead>
        <tbody>
          <tr>
            <td><span class="city-name">${m.city}</span>${badge}</td>
            <td>${m.phone} <button class="copy-btn" onclick="navigator.clipboard.writeText('${m.phone}');alert('Copied!')">📋</button></td>
            <td><a href="${m.link}" target="_blank" class="action-link">📅 OPEN MOEGO</a></td>
          </tr>
        </tbody>
      </table>`;
      updateLiveClock(m.state);
  }

  function buildCustomDropdown() {
    const dropdown = document.getElementById('customDropdown');
    const cities = [...new Set(data.map(d => d.city.trim()))].sort();
    dropdown.innerHTML = cities.map(city => `<div class="dropdown-item" onclick="selectCity('${city}')">${city}</div>`).join('');
  }

  function selectCity(city) {
    document.getElementById('hubSearchInput').value = city;
    document.getElementById('customDropdown').style.display = 'none';
    const match = data.find(d => d.city.trim() === city);
    if (match) { 
        let hubCoords = rawCoords[city];
        if(hubCoords) map.flyTo(hubCoords, 10);
        document.getElementById('result').innerText = "📍 Hub Selected: " + city;
        document.getElementById('list-header').classList.remove('hidden');
        renderSingleRow(match);
    }
  }

  function showDropdown() { document.getElementById('customDropdown').style.display = 'block'; }
  function filterDropdown() {
    const input = document.getElementById('hubSearchInput').value.toLowerCase();
    document.querySelectorAll('.dropdown-item').forEach(item => item.style.display = item.innerText.toLowerCase().includes(input) ? 'block' : 'none');
  }

  function resetSearchState() { document.getElementById('location-list').innerHTML = ""; document.getElementById('list-header').classList.add('hidden'); if(clockInterval) clearInterval(clockInterval); }
  
  function switchTab(t) { 
    document.getElementById('locator-section').classList.toggle('hidden', t !== 'locator'); 
    document.getElementById('breed-section').classList.toggle('hidden', t === 'locator'); 
    document.getElementById('tab-loc').classList.toggle('active', t === 'locator'); 
    document.getElementById('tab-breed').classList.toggle('active', t !== 'locator'); 
    if(t === 'locator') setTimeout(() => map.invalidateSize(), 200); 
  }

  window.onclick = (e) => { 
    if (!e.target.matches('#hubSearchInput')) document.getElementById('customDropdown').style.display = 'none';
    if (!e.target.matches('#breedInput')) document.getElementById('customBreedDropdown').style.display = 'none';
  }

  document.getElementById('zipInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') lookup(); });

  async function startup() {
    await loadBreeds();
    loadData(); 
  }
  startup();
</script>
</body>
</html>
